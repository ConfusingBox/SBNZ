<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SBNZ - Kreditni Sistem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                
                <div class="card shadow-sm mb-4">
                    <div class="card-body text-center bg-primary text-white rounded">
                        <h2>Sistem za procenu kreditnog rizika</h2>
                        <p class="mb-0">FTN - Sistemi bazirani na znanju (CEP + Šabloni)</p>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white font-weight-bold fs-5 text-primary">Unos podataka klijenta i zahteva</div>
                    <div class="card-body">
                        <form th:action="@{/analiza}" method="post">
                            
                            <div class="row mb-3">
                                <div class="col-md-5">
                                    <label class="form-label font-weight-bold">Ime i prezime klijenta</label>
                                    <input type="text" name="ime" class="form-control" th:value="${param.ime != null ? param.ime : 'Marko Markovic'}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Starost</label>
                                    <input type="number" name="starost" class="form-control" th:value="${param.starost != null ? param.starost : '34'}" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Tip kredita</label>
                                    <select name="tipKredita" class="form-select">
                                        <option value="STAMBENI" th:selected="${#strings.equals(param.tipKredita, 'STAMBENI')}">Stambeni kredit</option>
                                        <option value="POTROSACKI" th:selected="${#strings.equals(param.tipKredita, 'POTROSACKI')}">Potrošački kredit</option>
                                        <option value="POSLOVNI" th:selected="${#strings.equals(param.tipKredita, 'POSLOVNI')}">Poslovni kredit</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <label class="form-label">Mesečni prihod (€)</label>
                                    <input type="number" name="prihod" class="form-control" th:value="${param.prihod != null ? param.prihod : '2500'}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Mesečne obaveze (€)</label>
                                    <input type="number" name="obaveze" class="form-control" th:value="${param.obaveze != null ? param.obaveze : '200'}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Iznos kredita (€)</label>
                                    <input type="number" name="iznosKredita" class="form-control" th:value="${param.iznosKredita != null ? param.iznosKredita : '50000'}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Rok otplate (godina)</label>
                                    <input type="number" name="rok" class="form-control" th:value="${param.rok != null ? param.rok : '20'}" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4 d-flex align-items-center mt-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="kolateral" id="kolateralCheck" th:checked="${param.kolateral != null ? param.kolateral : true}">
                                        <label class="form-check-label" for="kolateralCheck">Kolateral obezbeđen</label>
                                    </div>
                                </div>
                            </div>

                            <h6 class="text-muted border-bottom pb-2 mt-4">Istorija kašnjenja u otplati</h6>
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Kašnjenja do 30 dana</label>
                                    <input type="number" name="kasnjenjeDo30" class="form-control" th:value="${param.kasnjenjeDo30 != null ? param.kasnjenjeDo30 : '0'}" min="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Kašnjenja 30–90 dana</label>
                                    <input type="number" name="kasnjenje30Do90" class="form-control" th:value="${param.kasnjenje30Do90 != null ? param.kasnjenje30Do90 : '0'}" min="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Kašnjenja preko 90 dana</label>
                                    <input type="number" name="kasnjenjePreko90" class="form-control" th:value="${param.kasnjenjePreko90 != null ? param.kasnjenjePreko90 : '0'}" min="0">
                                </div>
                            </div>

                            <h6 class="text-muted border-bottom pb-2 mt-4">Prinudne naplate, Stečajevi i Odbijeni zahtevi</h6>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Prinudna naplata (Izvršenje)</label>
                                    <select name="prinudnaNaplata" class="form-select">
                                        <option value="NEMA" th:selected="${#strings.equals(param.prinudnaNaplata, 'NEMA')}">Nema istorije prinudne naplate</option>
                                        <option value="POSLEDNJIH_12_MESECI" th:selected="${#strings.equals(param.prinudnaNaplata, 'POSLEDNJIH_12_MESECI')}">U poslednjih 12 meseci (+10 bodova)</option>
                                        <option value="RANIJE" th:selected="${#strings.equals(param.prinudnaNaplata, 'RANIJE')}">Pre više od 12 meseci (+5 bodova)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Stečaj ili reprogram duga</label>
                                    <select name="stecajReprogram" class="form-select">
                                        <option value="NEMA" th:selected="${#strings.equals(param.stecajReprogram, 'NEMA')}">Nema istorije stečaja/reprograma</option>
                                        <option value="POSLEDNJIH_12_MESECI" th:selected="${#strings.equals(param.stecajReprogram, 'POSLEDNJIH_12_MESECI')}">U poslednjih 12 meseci (+10 bodova)</option>
                                        <option value="RANIJE" th:selected="${#strings.equals(param.stecajReprogram, 'RANIJE')}">Pre više od 12 meseci (+7 bodova)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Odbijeni zahtevi (zadnjih 6 mes.)</label>
                                    <input type="number" name="odbijeniZadnjih6Mes" class="form-control" th:value="${param.odbijeniZadnjih6Mes != null ? param.odbijeniZadnjih6Mes : '0'}" min="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Odbijeni zahtevi (pre više od 6 mes.)</label>
                                    <input type="number" name="odbijeniRanije" class="form-control" th:value="${param.odbijeniRanije != null ? param.odbijeniRanije : '0'}" min="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Uredno izmirivanje (godina)</label>
                                    <input type="number" name="urednoGodina" class="form-control" th:value="${param.urednoGodina != null ? param.urednoGodina : '2'}" min="0">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 mt-3 fs-5 shadow-sm">Pokreni Drools Analizu</button>
                        </form>
                    </div>
                </div>

                <div th:if="${status}" class="card shadow-sm mt-4 border-primary">
                    <div class="card-header bg-primary text-white font-weight-bold fs-5">Rezultat Drools Evaluacije</div>
                    <div class="card-body">
                        <h5 class="card-title text-center mb-4 text-secondary" th:text="${poruka}"></h5>
                        
                        <table class="table table-striped table-bordered">
                            <tbody>
                                <tr>
                                    <th scope="row" class="w-50 fs-6">Krajnji status zahteva:</th>
                                    <td>
                                        <span th:text="${status}" 
                                              th:class="${status.toString() == 'ODBIJEN'} ? 'badge bg-danger p-2 fs-6' : 'badge bg-success p-2 fs-6'">
                                        </span>
                                    </td>
                                </tr>
                                <tr>
                                    <th scope="row" class="fs-6">Kreditni razred zahteva:</th>
                                    <td class="fw-bold fs-6" th:text="${razred != null ? razred : 'Nije dodeljen'}"></td>
                                </tr>
                                <tr>
                                    <th scope="row" class="fs-6">Obrazloženje sistema:</th>
                                    <td class="text-muted fs-6" th:text="${obrazlozenje != null ? obrazlozenje : 'Bez obrazloženja.'}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
